<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <title>Covo di Cthulhu</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { background: #0d1117; overflow-x: hidden; }
      input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
      @keyframes slide-in { from { opacity: 0; transform: translateX(60px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes slide-out { from { opacity: 0; transform: translateX(-60px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes fade-in { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
      @keyframes pop-in { 0% { opacity: 0; transform: scale(0.8); } 70% { transform: scale(1.03); } 100% { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
